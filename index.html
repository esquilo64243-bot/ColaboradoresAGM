<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portal do Colaborador</title>

    <link rel="stylesheet" href="./login.css" />
    <link rel="icon" type="image/png" href="../" />
  </head>

  <body>
    <main class="login-container">
      <section class="login-card">
        <div class="logo-area">
          <img src="../01_HOME/img/Logo_AGM.png" alt="Logo AGM" />
          <h1>Portal do Colaborador</h1>
          <p>Acesse para preencher seus checklists</p>
        </div>

        <form id="formLogin">
          <div class="form-group">
            <label for="matricula">Matrícula ou CPF</label>
            <input
              type="text"
              id="matricula"
              placeholder="Digite sua matrícula ou CPF"
              required
            />
          </div>

          <div class="form-group">
            <label for="senha">Senha</label>
            <input
              type="password"
              id="senha"
              placeholder="Digite sua senha"
              required
            />
          </div>

          <button type="submit">Entrar</button>

          <p id="mensagemErro" class="mensagem-erro"></p>
        </form>
      </section>
    </main>

    <script type="module" src="./login.js"></script>
  </body>
</html>
